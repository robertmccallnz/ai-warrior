             c -12 0 -20 -8 -20 -18
             c 0 -8 6 -14 14 -14
             c 6 0 10 4 10 9
             L 112 105
             c 0 -10 -8 -16 -18 -16
             c -14 0 -24 10 -24 24
             c 0 18 14 30 32 30
             c 22 0 38 -16 38 -38
             c 0 -26 -20 -44 -46 -44
             c -30 0 -52 22 -52 52
             c 0 32 24 56 58 56
             c 38 0 66 -28 66 -66
             c 0 -44 -32 -76 -76 -76
             c -10 0 -18 1 -26 3
